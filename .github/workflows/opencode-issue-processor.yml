name: OpenCode Issue Processor

on:
  issues:
    types: [labeled, edited]
  issue_comment:
    types: [created]

concurrency:
  group: process-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  process-issue:
    runs-on: self-hosted
    timeout-minutes: 30
    
    steps:
      - name: Check trigger conditions
        id: check-label
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          ADDED_LABEL: ${{ github.event.label.name || '' }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # 检查 issue 状态是否为 open
          if [ "$ISSUE_STATE" != "open" ]; then
            echo "Skipping: issue state is '$ISSUE_STATE', not 'open'"
            exit 0
          fi
          
          # labeled 事件：只有添加 accept 标签才执行
          if [ "$EVENT_NAME" = "issues" ] && [ "$ACTION" = "labeled" ]; then
            if [ "$ADDED_LABEL" != "accept" ]; then
              echo "Skipping: labeled event but label is '$ADDED_LABEL', not 'accept'"
              exit 0
            fi
            echo "has_accept=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # edited 或 issue_comment 事件：检查 issue 是否有 accept 标签
          LABELS=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json labels -q '.labels[].name')
          
          if echo "$LABELS" | grep -q "^accept$"; then
            echo "has_accept=true" >> $GITHUB_OUTPUT
          else
            echo "has_accept=false" >> $GITHUB_OUTPUT
            echo "Skipping: issue does not have 'accept' label"
          fi

      - name: Exit if not accept
        if: steps.check-label.outputs.has_accept != 'true'
        run: exit 0

      - name: Checkout repository
        if: steps.check-label.outputs.has_accept == 'true'
        uses: actions/checkout@v4

      - name: Prepare issue data
        if: steps.check-label.outputs.has_accept == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/opencode
          
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json body -q '.body')
          
          cat > /tmp/opencode/issue_context.txt << EOF
          Issue #${{ env.ISSUE_NUMBER }}: $ISSUE_TITLE
          
          $ISSUE_BODY
          EOF
          
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json comments -q '.comments[] | "- \(.author.login): \(.body)"' > /tmp/opencode/issue_comments.txt || echo "暂无评论" > /tmp/opencode/issue_comments.txt

      - name: Run opencode
        if: steps.check-label.outputs.has_accept == 'true'
        id: opencode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          MESSAGE="请根据以下 GitHub Issue 进行需求和设计分析：
          
          Issue 内容：
          $(cat /tmp/opencode/issue_context.txt)
          
          评论区讨论：
          $(cat /tmp/opencode/issue_comments.txt)
          
          请输出详细的需求分析和设计方案。"
          
          cd ${{ github.workspace }}
          /home/wcp/.opencode/bin/opencode run "$MESSAGE" --model alibaba-cn/glm-5 --thinking=false > /tmp/opencode/output.txt 2>&1 || true
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post result to issue
        if: steps.check-label.outputs.has_accept == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EXIT_CODE: ${{ steps.opencode.outputs.exit_code }}
        run: |
          if [ -f /tmp/opencode/output.txt ] && [ -s /tmp/opencode/output.txt ]; then
            # 过滤 ANSI escape codes 和思考信息
            RESULT=$(cat /tmp/opencode/output.txt | sed 's/\x1b\[[0-9;]*m//g' | grep -v "^>\s*build\|^>\s*glm\|^✱\|^✗\|^←\|^→\|^$\s*\|^#\s*\|^$\s*whoami\|^$\s*ls\|^$\s*cat\|^$\s*pwd" | sed '/^$/N;/^\n$/d')
          else
            RESULT="执行失败，未生成输出"
          fi
          
          MAX_LENGTH=65000
          if [ ${#RESULT} -gt $MAX_LENGTH ]; then
            RESULT="${RESULT:0:$MAX_LENGTH}\n\n... (输出过长，已截断)"
          fi
          
          if [ "$EXIT_CODE" != "0" ]; then
            COMMENT="⚠️ **OpenCode 处理出错** (Exit code: $EXIT_CODE)
          
          \`\`\`
          $RESULT
          \`\`\`"
          else
            COMMENT="✅ **OpenCode 分析结果**
          
          $RESULT"
          fi
          
          gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$COMMENT"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/opencode || true