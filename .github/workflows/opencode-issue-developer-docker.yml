name: OpenCode Issue Developer (Docker)

on:
  issues:
    types: [labeled]

concurrency:
  group: develop-issue-docker-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  developer-issue-docker:
    runs-on: self-hosted
    container:
      image: ghcr.io/kaede10/opencode:latest
      options: --user root
      env:
        HOME: /root
    timeout-minutes: 60
    
    steps:
      - name: Check if added label is approved
        id: check-label
        env:
          ADDED_LABEL: ${{ github.event.label.name }}
          ISSUE_STATE: ${{ github.event.issue.state }}
        run: |
          if [ "$ISSUE_STATE" != "open" ]; then
            echo "Skipping: issue state is '$ISSUE_STATE', not 'open'"
            exit 0
          fi
          
          if [ "$ADDED_LABEL" != "approved" ]; then
            echo "Skipping: added label is '$ADDED_LABEL', not 'approved'"
            exit 0
          fi
          echo "has_approved=true" >> $GITHUB_OUTPUT

      - name: Exit if not approved
        if: steps.check-label.outputs.has_approved != 'true'
        run: exit 0

      - name: Checkout repository
        if: steps.check-label.outputs.has_approved == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git credentials
        if: steps.check-label.outputs.has_approved == 'true'
        run: |
          git config --global --add safe.directory /__w/om-data/om-data
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reuse development branch
        if: steps.check-label.outputs.has_approved == 'true'
        id: create-branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH_NAME="issue-${{ env.ISSUE_NUMBER }}-dev"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q .; then
            echo "分支 $BRANCH_NAME 已存在，复用该分支"
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "创建新分支 $BRANCH_NAME"
            git checkout -b $BRANCH_NAME
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Prepare issue data
        if: steps.check-label.outputs.has_approved == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/opencode
          
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json body -q '.body')
          
          cat > /tmp/opencode/issue_context.txt << EOF
          Issue #${{ env.ISSUE_NUMBER }}: $ISSUE_TITLE
          
          $ISSUE_BODY
          EOF
          
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json comments -q '.comments[] | "- \(.author.login): \(.body)"' > /tmp/opencode/issue_comments.txt || echo "暂无评论" > /tmp/opencode/issue_comments.txt

      - name: Run opencode for development
        if: steps.check-label.outputs.has_approved == 'true'
        id: opencode
        run: |
          MESSAGE="请根据以下 GitHub Issue 和分析结果进行代码开发实现：
          
          Issue 内容：
          $(cat /tmp/opencode/issue_context.txt)
          
          评论区的分析和讨论：
          $(cat /tmp/opencode/issue_comments.txt)
          
          请根据分析结果实现代码变更。
          
          完成后，请将 PR 描述写入 /tmp/opencode/pr_body.md，格式如下：
          
          ## 描述
          <!-- 简要描述这个 PR 的目的和变更内容 -->
          
          ## 相关 Issue
          resolve https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }}
          
          ## 变更类型
          <!-- 根据实际变更类型保留对应项 -->
          - [ ] Bug 修复
          - [ ] 新功能
          - [ ] 代码重构
          - [ ] 文档更新
          - [ ] 样式改进
          - [ ] 性能优化
          - [ ] 测试相关
          - [ ] 其他"

          opencode run "$MESSAGE" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false --log-level ERROR 2>/dev/null || true
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        if: steps.check-label.outputs.has_approved == 'true'
        id: check-changes
        run: |
          git checkout -- .github/workflows/ 2>/dev/null || true
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git add -A ':!.github/workflows/'
          git commit -m "Implement changes for issue #${{ env.ISSUE_NUMBER }}"

      - name: Push branch
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
        run: |
          git push -u origin $BRANCH_NAME

      - name: Create Pull Request
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        id: create-pr
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/opencode/pr_body.md ] && [ -s /tmp/opencode/pr_body.md ]; then
            PR_BODY=$(cat /tmp/opencode/pr_body.md)
          else
            PR_BODY="实现 issue #${{ env.ISSUE_NUMBER }} 的代码变更"
          fi
          
          PR_URL=$(gh pr create --title "Implement issue #${{ env.ISSUE_NUMBER }}" --body "$PR_BODY" --base main)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          gh pr edit --add-label "auto-generated"

      - name: Post result to issue
        if: steps.check-label.outputs.has_approved == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EXIT_CODE: ${{ steps.opencode.outputs.exit_code }}
          HAS_CHANGES: ${{ steps.check-changes.outputs.has_changes }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            COMMENT="⚠️ **OpenCode 开发出错** (Exit code: $EXIT_CODE)"
          elif [ "$HAS_CHANGES" != "true" ]; then
            COMMENT="ℹ️ **OpenCode 开发完成**

          未检测到代码变更。"
          else
            COMMENT="✅ **OpenCode 开发完成**

          已创建 PR: $PR_URL"
          fi
          
          gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$COMMENT"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/opencode || true