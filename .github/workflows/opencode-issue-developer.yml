name: OpenCode Issue Developer

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to develop'
        required: true
        type: number

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  develop-issue:
    runs-on: self-hosted
    timeout-minutes: 60
    
    steps:
      - name: Check if issue has approved label
        id: check-label
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json labels -q '.labels[].name')
          
          if echo "$LABELS" | grep -q "^approved$"; then
            echo "has_approved=true" >> $GITHUB_OUTPUT
          else
            echo "has_approved=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if no approved label
        if: steps.check-label.outputs.has_approved != 'true'
        run: exit 0

      - name: Checkout repository
        if: steps.check-label.outputs.has_approved == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create development branch
        if: steps.check-label.outputs.has_approved == 'true'
        id: create-branch
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="issue-${{ env.ISSUE_NUMBER }}-dev"
          git push origin --delete $BRANCH_NAME 2>/dev/null || true
          git checkout -b $BRANCH_NAME
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Prepare issue data
        if: steps.check-label.outputs.has_approved == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/opencode
          
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json body -q '.body')
          
          cat > /tmp/opencode/issue_context.txt << EOF
          Issue #${{ env.ISSUE_NUMBER }}: $ISSUE_TITLE
          
          $ISSUE_BODY
          EOF
          
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json comments -q '.comments[] | "- \(.author.login): \(.body)"' > /tmp/opencode/issue_comments.txt || echo "暂无评论" > /tmp/opencode/issue_comments.txt

      - name: Run opencode for development
        if: steps.check-label.outputs.has_approved == 'true'
        id: opencode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          MESSAGE="请根据以下 GitHub Issue 和分析结果进行代码开发实现：
          
          Issue 内容：
          $(cat /tmp/opencode/issue_context.txt)
          
          评论区的分析和讨论：
          $(cat /tmp/opencode/issue_comments.txt)
          
          请根据分析结果实现代码变更。完成后请说明所做的修改。"
          
          cd ${{ github.workspace }}
          /home/wcp/.opencode/bin/opencode run "$MESSAGE" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions > /tmp/opencode/output.txt 2>&1 || true
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        if: steps.check-label.outputs.has_approved == 'true'
        id: check-changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement changes for issue #${{ env.ISSUE_NUMBER }}"

      - name: Push branch
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
        run: |
          git push -u origin $BRANCH_NAME

      - name: Create Pull Request
        if: steps.check-label.outputs.has_approved == 'true' && steps.check-changes.outputs.has_changes == 'true'
        id: create-pr
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create --title "Implement issue #${{ env.ISSUE_NUMBER }}" --body "This PR implements the changes for issue #${{ env.ISSUE_NUMBER }}.\n\n## Changes\n\n$(cat /tmp/opencode/output.txt)" --base main)
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          gh pr edit --add-label "auto-generated"

      - name: Post result to issue
        if: steps.check-label.outputs.has_approved == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          EXIT_CODE: ${{ steps.opencode.outputs.exit_code }}
          HAS_CHANGES: ${{ steps.check-changes.outputs.has_changes }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
        run: |
          if [ -f /tmp/opencode/output.txt ] && [ -s /tmp/opencode/output.txt ]; then
            RESULT=$(cat /tmp/opencode/output.txt)
          else
            RESULT="执行失败，未生成输出"
          fi
          
          MAX_LENGTH=65000
          if [ ${#RESULT} -gt $MAX_LENGTH ]; then
            RESULT="${RESULT:0:$MAX_LENGTH}\n\n... (输出过长，已截断)"
          fi
          
          if [ "$EXIT_CODE" != "0" ]; then
            COMMENT="⚠️ **OpenCode 开发出错** (Exit code: $EXIT_CODE)
          
          \`\`\`
          $RESULT
          \`\`\`"
          elif [ "$HAS_CHANGES" != "true" ]; then
            COMMENT="ℹ️ **OpenCode 开发完成**
          
          未检测到代码变更。$RESULT"
          else
            COMMENT="✅ **OpenCode 开发完成**
          
          已创建 PR: $PR_URL
          
          $RESULT"
          fi
          
          gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$COMMENT"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/opencode || true