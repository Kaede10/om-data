name: Build OpenCode Docker Image

on:
  push:
    paths:
      - 'docker/opencode/Dockerfile'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/opencode
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opencode:latest