name: Build OpenCode Docker Image

on:
  push:
    paths:
      - 'docker/opencode/Dockerfile'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          sudo docker build -t ghcr.io/${{ github.repository_owner }}/opencode:latest docker/opencode
          sudo docker push ghcr.io/${{ github.repository_owner }}/opencode:latest